<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>地圖批改 | 探索・地理</title>
<link rel="stylesheet" href="./css/style.css">
<style>
.grader-wrap {
  max-width: 680px;
  margin: 40px auto;
  padding: 0 24px 60px;
}
.grade-tag {
  display: inline-block;
  background: rgba(196,168,79,.1);
  color: var(--gold);
  font-size: .72rem;
  letter-spacing: .3em;
  padding: 6px 16px;
  border: 1px solid var(--gold-line);
  margin-bottom: 28px;
}
.upload-zone {
  border: 2px dashed var(--gold-line);
  background: var(--cream-2);
  padding: 60px 24px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: border-color .25s, background .25s;
  margin-bottom: 20px;
}
.upload-zone:hover, .upload-zone.drag {
  border-color: var(--gold);
  background: rgba(196,168,79,.04);
}
.upload-zone input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.upload-icon { font-size: 3rem; display: block; margin-bottom: 14px; }
.upload-title { font-size: 1rem; font-weight: 500; letter-spacing: .1em; color: var(--text-main); margin-bottom: 6px; }
.upload-sub { font-size: .78rem; color: var(--text-muted); letter-spacing: .05em; }
#previewImg {
  width: 100%;
  border: 1px solid var(--gold-line);
  margin-bottom: 20px;
  display: none;
}
.submit-bar { display: none; text-align: center; margin-bottom: 32px; }
.submit-main {
  background: var(--gold);
  color: var(--dark);
  border: none;
  padding: 14px 56px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: .85rem;
  font-weight: 500;
  letter-spacing: .3em;
  cursor: pointer;
  transition: opacity .2s;
}
.submit-main:hover { opacity: .85; }
.submit-main:disabled { opacity: .45; cursor: not-allowed; }
.reupload-link {
  display: block;
  margin-top: 12px;
  font-size: .73rem;
  color: var(--text-muted);
  letter-spacing: .12em;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}
.loading-box {
  text-align: center;
  padding: 52px 0;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--gold-line);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: .8rem; color: var(--text-muted); letter-spacing: .18em; }
.score-hero {
  text-align: center;
  padding: 36px 0 28px;
  border-bottom: 1px solid var(--gold-line);
  margin-bottom: 28px;
}
.score-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 6rem;
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
}
.score-denom { font-size: .78rem; color: var(--text-muted); letter-spacing: .22em; margin-top: 6px; }
.score-row { display: flex; gap: 12px; margin-bottom: 28px; }
.score-cell {
  flex: 1;
  background: var(--cream-2);
  border: 1px solid var(--gold-line);
  padding: 22px 12px;
  text-align: center;
}
.score-cell .pts {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
}
.score-cell .of { font-size: .7rem; color: var(--text-muted); }
.score-cell .lbl { font-size: .7rem; letter-spacing: .18em; color: var(--text-muted); margin-top: 6px; }
.comment-section { margin-bottom: 20px; }
.comment-label {
  font-size: .67rem;
  font-weight: 500;
  letter-spacing: .32em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.comment-label::after { content: ''; flex: 1; height: 1px; background: var(--gold-line); }
.comment-text {
  font-size: .9rem;
  line-height: 1.9;
  color: var(--text-main);
  background: var(--cream-2);
  border-left: 3px solid var(--gold);
  padding: 14px 18px;
}
.overall-box {
  background: var(--dark-2);
  color: rgba(255,255,255,.82);
  padding: 20px 24px;
  font-size: .9rem;
  line-height: 1.9;
  border-left: 3px solid var(--gold);
  margin-bottom: 28px;
}
.retry-btn {
  display: block;
  width: 100%;
  text-align: center;
  padding: 14px;
  border: 1px solid var(--gold-line);
  color: var(--text-muted);
  font-size: .74rem;
  letter-spacing: .22em;
  cursor: pointer;
  background: transparent;
  font-family: inherit;
  transition: border-color .2s, color .2s;
}
.retry-btn:hover { border-color: var(--gold); color: var(--gold); }
.error-box {
  background: #1a0808;
  border-left: 3px solid #b84444;
  padding: 16px 18px;
  color: rgba(255,255,255,.7);
  font-size: .85rem;
  margin-bottom: 16px;
  line-height: 1.7;
}
@media (max-width: 480px) {
  .grader-wrap { padding: 0 16px 40px; margin-top: 24px; }
  .score-num { font-size: 4.5rem; }
}
.id-field {
  margin-bottom: 20px;
}
.id-label {
  display: block;
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .25em;
  color: var(--gold);
  margin-bottom: 8px;
}
.id-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--cream-2);
  border: 1px solid var(--gold-line);
  border-left: 3px solid var(--gold);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 1rem;
  color: var(--text-main);
  outline: none;
  transition: border-color .2s;
}
.id-input:focus { border-color: var(--gold); }
.id-hint { font-size: .72rem; color: var(--text-muted); margin-top: 6px; letter-spacing: .04em; }
</style>
</head>
<body>
<header class="site-header">
  <nav class="top-nav">
    <a href="./index.html">首頁</a>
    <a href="./grade1/index.html">一年級</a>
    <a href="./grade2/index.html">二年級</a>
    <a href="./grade3/index.html">三年級</a>
    <a href="./about.html">課程說明</a>
    <a href="./resources.html">其他資源</a>
    <a href="./feedback.html">問題與回饋</a>
  </nav>
  <div class="header-text">
    <h1>地圖批改 <span class="en">MAP GRADER</span></h1>
  </div>
</header>

<div class="grader-wrap">
  <div id="gradeTag" class="grade-tag">— 地圖作業批改 —</div>

  <div class="id-field">
    <label class="id-label" for="studentId">班級座號</label>
    <input class="id-input" type="text" id="studentId" placeholder="例如：二年一班12號 → 20112" maxlength="10">
    <div class="id-hint">請填寫後再上傳地圖，成績才能記錄到系統。</div>
  </div>

  <div class="upload-zone" id="uploadZone">
    <input type="file" accept="image/*" id="fileInput">
    <span class="upload-icon">🗺️</span>
    <div class="upload-title">上傳你的地圖作業</div>
    <div class="upload-sub">點此從相簿或檔案選擇圖片</div>
  </div>

  <img id="previewImg" alt="地圖預覽">

  <div class="submit-bar" id="submitBar">
    <button class="submit-main" id="submitBtn" onclick="submitGrading()">送出批改</button>
    <span class="reupload-link" onclick="resetAll()">重新選擇圖片</span>
  </div>

  <div id="loadingBox" style="display:none">
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="loading-text">AI 正在批改你的地圖⋯</div>
    </div>
  </div>

  <div id="resultBox"></div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbym52RdqtYgxRTQzyCZlpUggn3hYOm4d__96MHGJ2rjE3fTV2OBGr7pqQRcSjOQKHeR/exec';

const GRADE_INFO = {
  '1': { label: '一年級' },
  '2': { label: '二年級' },
  '3': { label: '三年級' }
};

let base64Image = null;

const grade = new URLSearchParams(location.search).get('grade') || '1';
const info = GRADE_INFO[grade] || GRADE_INFO['1'];
document.getElementById('gradeTag').textContent = `— ${info.label} 地圖作業批改 —`;
document.title = `${info.label}地圖批改 | 探索・地理`;

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.75);
      base64Image = compressed.split(',')[1];
      const preview = document.getElementById('previewImg');
      preview.src = compressed;
      preview.style.display = 'block';
      zone.style.display = 'none';
      document.getElementById('submitBar').style.display = 'block';
      document.getElementById('resultBox').innerHTML = '';
      document.getElementById('loadingBox').style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function submitGrading() {
  if (!base64Image) return;
  const studentId = document.getElementById('studentId').value.trim();
  if (!studentId) {
    document.getElementById('studentId').focus();
    document.getElementById('studentId').style.borderColor = '#b84444';
    showError('請先填寫班級座號再送出。');
    return;
  }
  document.getElementById('studentId').style.borderColor = '';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '批改中⋯';
  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('resultBox').innerHTML = '';

  try {
    const payload = JSON.stringify({ image: base64Image, mimeType: 'image/jpeg', grade, studentId });
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'data=' + encodeURIComponent(payload)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '批改失敗，請重試。');
    showResult(data.result);
  } catch (err) {
    showError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '送出批改';
    document.getElementById('loadingBox').style.display = 'none';
  }
}

function showResult(r) {
  const medal = r.total_score >= 90 ? '🏆' : r.total_score >= 80 ? '🌟' : r.total_score >= 70 ? '👍' : '✏️';
  document.getElementById('resultBox').innerHTML = `
    <div class="score-hero">
      <div class="score-num">${medal} ${r.total_score}</div>
      <div class="score-denom">總分 / 100</div>
    </div>
    <div class="score-row">
      <div class="score-cell">
        <div class="pts">${r.content_score}</div>
        <div class="of">/ 60</div>
        <div class="lbl">內容</div>
      </div>
      <div class="score-cell">
        <div class="pts">${r.aesthetic_score}</div>
        <div class="of">/ 40</div>
        <div class="lbl">美感</div>
      </div>
    </div>
    <div class="comment-section">
      <div class="comment-label">內容評語</div>
      <div class="comment-text">${r.content_comment}</div>
    </div>
    <div class="comment-section">
      <div class="comment-label">美感評語</div>
      <div class="comment-text">${r.aesthetic_comment}</div>
    </div>
    <div class="overall-box">${r.overall_comment}</div>
    <button class="retry-btn" onclick="resetAll()">重新上傳另一張</button>
  `;
}

function showError(msg) {
  document.getElementById('resultBox').innerHTML = `
    <div class="error-box">${msg}</div>
    <button class="retry-btn" onclick="resetAll()">重試</button>
  `;
}

function saveToSheet(studentId, r) {
  if (!APPS_SCRIPT_URL) return;
  const comment = `內容(${r.content_score}/60)：${r.content_comment} ／ 美感(${r.aesthetic_score}/40)：${r.aesthetic_comment}`;
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ studentId, score: r.total_score, comment })
  });
}

function resetAll() {
  base64Image = null;
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('submitBar').style.display = 'none';
  document.getElementById('resultBox').innerHTML = '';
  document.getElementById('fileInput').value = '';
}
</script>
</body>
</html>
